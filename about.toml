# cargo-about license aggregation policy.
#
# `accepted` lists every license SPDX expression we are willing to
# accept in the dependency tree. The list mirrors `deny.toml` —
# changes here should land in both files in the same change.
#
# Generate the supplement: `just credits`.
# Output: docs/third-party-notices.md (auto-regenerated, do not edit).

accepted = [
    "0BSD",
    # AGPL-3.0-only: pulled in by evalexpr (>= v12). Permitted in a
    # GPL-3.0 project via GPLv3 §13. Keep in sync with deny.toml.
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# Our own workspace crates are first-party (GPL-3.0-only) and must not
# appear in this third-party supplement — they are credited in
# CREDITS.md's narrative instead. Internal crates stay `publish = false`;
# public first-party crates set `publish = ["crates-io"]`. cargo-about
# only has a "private" exclusion mechanism for workspace crates, so the
# crates.io registry name is listed here to keep public first-party crates
# out of the generated third-party notice.
private = { ignore = true, registries = ["crates-io"] }
