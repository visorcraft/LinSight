# cargo-about license aggregation policy.
#
# `accepted` lists every license SPDX expression we are willing to
# accept in the dependency tree. The list mirrors `deny.toml` —
# changes here should land in both files in the same change.
#
# Generate the supplement: `just credits`.
# Output: docs/third-party-notices.md (auto-regenerated, do not edit).

accepted = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# Skip workspace members in the auto-generated supplement — they're
# our own code, credited in CREDITS.md's narrative. Names must match
# the `[package].name` in each crate's Cargo.toml; adding entries for
# crates that don't exist is harmless but misleading.
[linsight]
[linsight-core]
[linsight-protocol]
[linsight-plugin-sdk]
[linsight-cli]
[linsightd]
[linsight-tunnel]
[linsight-sensors-cpu]
[linsight-sensors-mem]
[linsight-sensors-net]
[linsight-sensors-nvme]
[linsight-sensors-nvml]
[linsight-sensors-xe]
[linsight-sensors-zram]
[linsight-sensors-i915]
[linsight-sensors-systemd]
[linsight-sensors-sock]
[linsight-sensors-containers]
