app-id: io.visorcraft.LinSight
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: linsight

finish-args:
  # Wayland + X11 fallback for the GUI itself.
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # /sys/class/hwmon and /sys/class/drm are required for the xe + nvme +
  # net sensors. Flatpak's sandbox doesn't expose them by default, so we
  # ask for host-filesystem read access. This weakens the sandbox; users
  # who want stricter isolation should run from a native distro package.
  - --filesystem=host:ro
  # NVML needs the NVIDIA driver libraries from the host. The host filter
  # already covers this; --device=all also exposes /dev/nvidia* nodes for
  # plugins that hit the driver directly.
  - --device=all
  # Always-on mode needs to bind a TCP port for the Prometheus exporter
  # and a Unix socket for the daemon — `--share=network` allows both.
  - --share=network

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/linsight/cargo

modules:
  - name: linsight
    buildsystem: simple
    build-commands:
      - mkdir -p "${CARGO_HOME}"
      - |
        cat > "${CARGO_HOME}/config.toml" <<EOF
        [source.crates-io]
        replace-with = "vendored-sources"
        [source.vendored-sources]
        directory = "$(pwd)/vendor"
        EOF
      - cargo --offline build --workspace --release --locked
      - install -Dm755 target/release/linsight     /app/bin/linsight
      - install -Dm755 target/release/linsightd    /app/bin/linsightd
      - install -Dm755 target/release/linsight-cli /app/bin/linsight-cli
      - install -Dm644 packaging/io.visorcraft.LinSight.desktop
          /app/share/applications/io.visorcraft.LinSight.desktop
      - install -Dm644 packaging/io.visorcraft.LinSight.metainfo.xml
          /app/share/metainfo/io.visorcraft.LinSight.metainfo.xml
    sources:
      - type: dir
        path: ../..
      - type: archive
        # The vendor archive is produced by `just flatpak-vendor` before
        # invoking flatpak-builder. The Justfile's `flatpak` recipe handles
        # the vendor step automatically.
        path: vendor.tar.gz
        dest: vendor
        strip-components: 1
