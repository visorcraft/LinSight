<!--
  Placeholder LinSight icon. Replace with proper brand design once
  available. The mark is a stylized "L" formed by three stacked bars
  (echoing a multi-tile dashboard layout) on a rounded square.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1f24"/>
      <stop offset="100%" stop-color="#0d1115"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#84d4ff"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Three stacked bars suggesting CPU / GPU / Storage tiles -->
  <rect x="112" y="128" width="288" height="56" rx="14" fill="url(#accent)" opacity="0.92"/>
  <rect x="112" y="228" width="208" height="56" rx="14" fill="url(#accent)" opacity="0.72"/>
  <rect x="112" y="328" width="288" height="56" rx="14" fill="url(#accent)" opacity="0.52"/>
</svg>
