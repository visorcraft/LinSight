  SPDX-License-Identifier: GPL-3.0-only

  LinSight brand mark. A stylized "L" formed by stacked
  horizontal bars (signal lines) rising from a baseline,
  on a rounded tile with the brand cyan→indigo gradient.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="LinSight">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5fb6ff"/>
      <stop offset="55%"  stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Rounded brand tile -->
  <rect x="8" y="8" width="240" height="240" rx="52" ry="52" fill="url(#brand)"/>

  <!-- Inner glow rim -->
  <rect x="14" y="14" width="228" height="228" rx="48" ry="48"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- Signal baseline (the foot of the L) -->
  <rect x="56" y="180" width="144" height="16" rx="7" fill="url(#bar)"/>

  <!-- Stacked bars rising left → right (telemetry feel) -->
  <rect x="56" y="148" width="22" height="22" rx="6" fill="#ffffff" opacity="0.92"/>
  <rect x="86" y="124" width="22" height="46" rx="6" fill="#ffffff" opacity="0.86"/>
  <rect x="116" y="96"  width="22" height="74" rx="6" fill="#ffffff" opacity="0.80"/>
  <rect x="146" y="68"  width="22" height="102" rx="6" fill="#ffffff" opacity="0.74"/>
  <rect x="176" y="44"  width="22" height="126" rx="6" fill="#ffffff" opacity="0.68"/>

  <!-- Highlight pulse on the tallest bar -->
  <circle cx="187" cy="48" r="6" fill="#ffffff" filter="url(#soft)"/>
</svg>
